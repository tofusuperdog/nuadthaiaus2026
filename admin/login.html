<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Login - World Nuad Thai Massage Championship</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            gold: '#D4AF37',
                            dark: '#0F172A',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-top: 4px solid #D4AF37;
        }
        body {
            background: linear-gradient(135deg, #0F172A 0%, #1E293B 100%);
            min-height: 100vh;
        }
    </style>
</head>
<body class="flex items-center justify-center p-4 antialiased">

<div class="w-full max-w-md">
    <!-- Header -->
    <div class="text-center mb-8">
        <img src="../images/logo-event.svg" alt="World Nuad Thai Massage Championship" class="hidden md:block h-20 mx-auto mb-4 drop-shadow-lg">
        <h1 class="text-2xl md:text-3xl font-bold text-white tracking-wide">Back Office Login</h1>
        <h2 class="text-lg md:text-xl font-semibold text-white tracking-wide mt-2">World Nuad Thai Massage Championship</h2>
        <p class="text-brand-gold mt-2 text-md font-medium tracking-wider">Australia 2026 - The 1st</p>
    </div>

    <!-- Login Card -->
    <div class="glass-panel rounded-2xl shadow-2xl p-8 relative overflow-hidden">
        
        <form id="loginForm" class="space-y-6">
            <div>
                <label for="email" class="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-envelope text-slate-400"></i>
                    </div>
                    <input type="email" id="email" required autocomplete="email"
                        class="block w-full pl-10 pr-3 py-3 border border-slate-300 rounded-xl focus:ring-brand-gold focus:border-brand-gold transition-colors text-slate-900"
                        placeholder="admin@example.com">
                </div>
            </div>

            <div>
                <div class="flex items-center justify-between mb-1">
                    <label for="password" class="block text-sm font-medium text-slate-700">Password</label>
                </div>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                        <i class="fa-solid fa-lock text-slate-400"></i>
                    </div>
                    <input type="password" id="password" required
                        class="block w-full pl-10 pr-12 py-3 border border-slate-300 rounded-xl focus:ring-brand-gold focus:border-brand-gold transition-colors text-slate-900"
                        placeholder="••••••••">
                    <button type="button" id="togglePasswordBtn" style="min-width: 48px;" class="absolute inset-y-0 right-0 flex items-center justify-center text-slate-400 hover:text-slate-600 focus:outline-none z-10 cursor-pointer rounded-r-xl">
                        <i class="fa-solid fa-eye" id="toggleIcon"></i>
                    </button>
                </div>
                <div class="mt-2 flex justify-end">
                    <button type="button" class="text-xs text-brand-gold hover:text-yellow-600 font-medium transition-colors" onclick="forgotPassword()">Forgot password?</button>
                </div>
            </div>

            <button type="submit" id="submitBtn" class="w-full flex justify-center py-3 px-4 border border-transparent rounded-xl shadow-sm text-sm font-bold text-brand-dark bg-brand-gold hover:bg-yellow-500 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-brand-gold transition-all duration-200">
                <span id="btnText">Sign In</span>
                <i id="btnSpinner" class="fa-solid fa-circle-notch fa-spin hidden ml-2"></i>
            </button>
        </form>

        <div class="mt-6 text-center">
            <a href="../index.php" class="text-sm font-medium text-slate-500 hover:text-slate-800 transition-colors">
                <i class="fa-solid fa-arrow-left mr-1"></i> Back to Homepage
            </a>
        </div>
    </div>

    <!-- Footer Info -->
    <div class="mt-8 text-center text-slate-400 text-xs relative z-10">
        <p>Version 0.10 &bull; Powered by <a href="https://www.juztbooking.com" target="_blank" class="text-brand-gold hover:underline font-medium">juztbooking.com</a></p>
    </div>
</div>

<script>
    // Config Supabase
    const SUPABASE_URL = 'https://wkdilyktuupzneoedhsb.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndrZGlseWt0dXVwem5lb2VkaHNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NzM3ODUsImV4cCI6MjA4OTM0OTc4NX0.0RqUASsfIiZGtXvTVrJwjmzKkpRUhxPwNVSn8bRlWVc';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // Initial Check - Redirect if already logged in locally
    // Note: Welcome page will re-verify the token against DB to ensure they weren't kicked out
    document.addEventListener("DOMContentLoaded", () => {
        const currentToken = localStorage.getItem('nt_admin_session');
        if (currentToken) {
            window.location.href = 'welcome.html';
        }
    });

    // Toggle Password Visibility
    const toggleBtn = document.getElementById('togglePasswordBtn');
    const passwordInput = document.getElementById('password');
    const toggleIcon = document.getElementById('toggleIcon');

    toggleBtn.addEventListener('click', () => {
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleIcon.classList.remove('fa-eye');
            toggleIcon.classList.add('fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            toggleIcon.classList.remove('fa-eye-slash');
            toggleIcon.classList.add('fa-eye');
        }
    });

    // Forgot Password Flow
    async function forgotPassword() {
        const { value: email } = await Swal.fire({
            title: 'Forgot Password',
            input: 'email',
            inputLabel: 'Enter your Admin Email Address',
            inputPlaceholder: 'admin@example.com',
            showCancelButton: true,
            confirmButtonColor: '#D4AF37',
            confirmButtonText: 'Send Password',
            showLoaderOnConfirm: true,
            preConfirm: async (loginEmail) => {
                if (!loginEmail) {
                    Swal.showValidationMessage('Please enter an email address');
                    return false;
                }
                try {
                    // Check credential
                    const { data, error } = await supabaseClient
                        .from('nuadthaiadmin_users')
                        .select('password')
                        .eq('email', loginEmail)
                        .single();

                    if (error || !data) {
                        throw new Error('Email not found in the system');
                    }

                    // Send email via Supabase Edge Function API
                    const response = await fetch('https://wkdilyktuupzneoedhsb.supabase.co/functions/v1/send-password-email', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ email: loginEmail, password: data.password })
                    });
                    
                    const result = await response.json();
                    if (!response.ok || !result.success) {
                        throw new Error(result.message || 'Failed to send email');
                    }

                    return result;
                } catch (error) {
                    Swal.showValidationMessage(`Request failed: ${error.message}`);
                }
            },
            allowOutsideClick: () => !Swal.isLoading()
        });

        if (email) {
            Swal.fire({
                icon: 'success',
                title: 'Sent!',
                text: 'Your password has been emailed to you. Please check your inbox.',
                confirmButtonColor: '#0F172A'
            });
        }
    }

    // Generate random session token
    function generateUUID() {
        return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, function(c) {
            var r = Math.random() * 16 | 0, v = c == 'x' ? r : (r & 0x3 | 0x8);
            return v.toString(16);
        });
    }

    // Form Submit
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value;
        const btnText = document.getElementById('btnText');
        const btnSpinner = document.getElementById('btnSpinner');
        const submitBtn = document.getElementById('submitBtn');

        // UI Loading
        btnText.textContent = 'Signing in...';
        btnSpinner.classList.remove('hidden');
        submitBtn.disabled = true;

        try {
            // Check credentials
            const { data, error } = await supabaseClient
                .from('nuadthaiadmin_users')
                .select('id, email, password')
                .eq('email', email)
                .single();

            if (error || !data) {
                throw new Error('Invalid email or password.');
            }

            // Verify plain text password
            if (data.password !== password) {
                throw new Error('Invalid email or password.');
            }

            // Generate new session token
            const sessionToken = generateUUID();

            // Store in DB - This will automatically invalidate previous sessions on other devices
            // because welcome.html will check if their local token matches this DB token.
            const { error: updateError } = await supabaseClient
                .from('nuadthaiadmin_users')
                .update({ session_token: sessionToken })
                .eq('id', data.id);

            if (updateError) {
                throw new Error('Failed to create session. Please try again.');
            }

            // Store token and email locally
            localStorage.setItem('nt_admin_session', sessionToken);
            localStorage.setItem('nt_admin_email', data.email);
            sessionStorage.setItem('nt_seen_welcome', 'true');

            // Redirect
            window.location.href = 'dashboard.html';

        } catch (err) {
            console.error(err);
            Swal.fire({
                icon: 'error',
                title: 'Login Failed',
                text: err.message || 'An unexpected error occurred.',
                confirmButtonColor: '#0F172A'
            });
        } finally {
            // Reset UI
            btnText.textContent = 'Sign In';
            btnSpinner.classList.add('hidden');
            submitBtn.disabled = false;
        }
    });

</script>
</body>
</html>
