<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management - World Nuad Thai Massage Championship</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            gold: '#D4AF37',
                            dark: '#0F172A',
                            surface: '#F8FAFC'
                        }
                    }
                }
            }
        }
    </script>
    <style>
        .glass-panel { background: white; border-top: 4px solid #D4AF37; }
    </style>
</head>
<body class="bg-brand-surface text-slate-800 antialiased font-sans min-h-screen flex flex-col">

<!-- Navigation Topbar -->
<nav class="bg-brand-dark text-white shadow-lg sticky top-0 z-50">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
        <div class="flex justify-between items-center h-16">
            <div class="flex items-center space-x-3">
                <img src="../images/logo-event.svg" alt="Logo" class="h-10">
                <span class="font-bold text-[#AAB3C1] tracking-wide">NT Admin</span>
            </div>
            
            <div class="hidden md:flex space-x-8">
                <a href="dashboard.html" class="border-b-2 border-transparent hover:text-brand-gold text-slate-300 px-3 py-2 text-sm font-semibold transition-colors">Registrations</a>
                <a href="summary.html" class="border-b-2 border-transparent hover:text-brand-gold text-slate-300 px-3 py-2 text-sm font-semibold transition-colors">Summary</a>
            </div>

            <div class="flex items-center space-x-4">
                <span id="userEmailNav" class="text-xs text-slate-400 hidden sm:block"></span>
                <a href="users.html" id="navUsersLinkBtn" title="User Management" class="text-brand-gold hover:text-white p-2 border-b-2 border-brand-gold rounded transition-colors hidden md:block">
                    <i class="fa-solid fa-users text-lg"></i>
                </a>
                <button onclick="signOut()" class="bg-red-500/10 hover:bg-red-500/20 text-red-500 px-3 py-1.5 rounded text-sm font-medium transition-colors hidden md:block">
                    <i class="fa-solid fa-power-off"></i><span class="hidden sm:inline ml-2">Sign Out</span>
                </button>
                <div class="-mr-2 flex md:hidden">
                    <button type="button" onclick="document.getElementById('mobileMenu').classList.toggle('hidden')" class="inline-flex items-center justify-center p-2 rounded-md text-slate-400 hover:text-white hover:bg-slate-700 focus:outline-none">
                        <i class="fa-solid fa-bars text-xl"></i>
                    </button>
                </div>
            </div>
        </div>
    </div>
    
    <div class="md:hidden hidden bg-slate-800" id="mobileMenu">
        <div class="px-2 pt-2 pb-3 space-y-1 sm:px-3 border-t border-slate-700">
            <a href="dashboard.html" class="text-slate-300 hover:bg-slate-700 hover:text-white block px-3 py-2 rounded-md text-base font-medium">Registrations</a>
            <a href="summary.html" class="text-slate-300 hover:bg-slate-700 hover:text-white block px-3 py-2 rounded-md text-base font-medium">Summary</a>
            <a href="users.html" class="bg-slate-900 text-brand-gold block px-3 py-2 rounded-md text-base font-bold">Admin Users</a>
            <button onclick="signOut()" class="text-red-400 hover:bg-slate-700 hover:text-red-300 w-full text-left block px-3 py-2 rounded-md text-base font-medium mt-2 border-t border-slate-700/50 pt-2">
                <i class="fa-solid fa-power-off mr-2"></i>Sign Out
            </button>
        </div>
    </div>
</nav>

<div class="flex-grow max-w-5xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
    
    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-2xl font-bold text-slate-900">Admin Users</h1>
            <p class="text-sm text-slate-500 mt-1">Manage system access privileges.</p>
        </div>
        <button onclick="openUserModal()" class="bg-brand-gold hover:bg-yellow-500 text-brand-dark px-4 py-2 rounded-lg text-sm font-bold shadow-sm transition-colors flex items-center">
            <i class="fa-solid fa-plus sm:mr-2"></i> <span class="hidden sm:inline">Add User</span>
        </button>
    </div>

    <!-- Users List -->
    <div class="glass-panel shadow-lg rounded-xl overflow-hidden relative">
        <div id="loadingOverlay" class="absolute inset-0 bg-white/80 backdrop-blur-sm flex items-center justify-center z-20 flex-col">
            <i class="fa-solid fa-circle-notch fa-spin text-4xl text-brand-gold mb-3"></i>
        </div>

        <ul id="userList" class="divide-y divide-slate-200">
            <!-- Rendered by JS -->
        </ul>
    </div>
</div>

<!-- User Modal -->
<div id="userModal" class="hidden fixed inset-0 z-[100] overflow-y-auto" aria-labelledby="modal-title" role="dialog" aria-modal="true">
    <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
        <div class="fixed inset-0 bg-slate-900/75 transition-opacity backdrop-blur-sm" onclick="closeUserModal()"></div>
        <span class="hidden sm:inline-block sm:align-middle sm:h-screen" aria-hidden="true">&#8203;</span>

        <div class="inline-block align-bottom bg-white rounded-2xl text-left overflow-hidden shadow-2xl transform transition-all sm:my-8 sm:align-middle sm:max-w-md w-full relative">
            <div class="absolute top-0 right-0 pt-4 pr-4">
                <button type="button" onclick="closeUserModal()" class="text-slate-400 hover:text-slate-500 focus:outline-none bg-slate-100 hover:bg-slate-200 rounded-full p-2 h-8 w-8 flex items-center justify-center transition-colors">
                    <span class="sr-only">Close</span><i class="fa-solid fa-xmark"></i>
                </button>
            </div>
            
            <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4 border-t-4 border-brand-gold">
                <div class="sm:flex sm:items-start w-full">
                    <div class="mt-3 text-center sm:mt-0 sm:text-left w-full">
                        <h3 class="text-lg leading-6 font-bold text-slate-900 mb-4" id="modalTitle">Add User</h3>
                        
                        <form id="userForm" class="space-y-4">
                            <input type="hidden" id="userId">
                            <div>
                                <label class="block text-xs font-semibold text-slate-700 uppercase tracking-wide mb-1">Email <span class="text-red-500">*</span></label>
                                <input type="email" id="userEmail" required class="block w-full border border-slate-300 rounded-lg py-2 px-3 focus:ring-brand-gold focus:border-brand-gold text-sm">
                            </div>
                            <div>
                                <label class="block text-xs font-semibold text-slate-700 uppercase tracking-wide mb-1">Password <span class="text-red-500" id="pwdAsterisk">*</span></label>
                                <div class="relative">
                                    <input type="password" id="userPassword" class="block w-full border border-slate-300 rounded-lg py-2 pl-3 pr-12 focus:ring-brand-gold focus:border-brand-gold text-sm" placeholder="Minimum 6 characters">
                                    <button type="button" id="toggleModalPwd" style="min-width: 40px;" class="absolute inset-y-0 right-0 flex items-center justify-center text-slate-400 hover:text-slate-600 focus:outline-none z-10 cursor-pointer rounded-r-lg">
                                        <i class="fa-solid fa-eye" id="toggleModalIcon"></i>
                                    </button>
                                </div>
                                <p class="text-xs text-slate-500 mt-1" id="pwdHelperText">Leave blank to keep existing password when editing.</p>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <div class="bg-slate-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse border-t border-slate-200">
                <button type="button" onclick="saveUser()" id="saveUserBtn" class="w-full inline-flex justify-center rounded-xl border border-transparent shadow-sm px-4 py-2 bg-brand-gold text-base font-bold text-brand-dark hover:bg-yellow-500 focus:outline-none sm:ml-3 sm:w-auto sm:text-sm transition-colors">
                    Save User
                </button>
                <button type="button" onclick="closeUserModal()" class="mt-3 w-full inline-flex justify-center rounded-xl border border-slate-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-slate-700 hover:bg-slate-50 focus:outline-none sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm transition-colors">
                    Cancel
                </button>
            </div>
        </div>
    </div>
</div>

<script>
    // --- SESSION AUTH ---
    const SUPABASE_URL = 'https://wkdilyktuupzneoedhsb.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndrZGlseWt0dXVwem5lb2VkaHNiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM3NzM3ODUsImV4cCI6MjA4OTM0OTc4NX0.0RqUASsfIiZGtXvTVrJwjmzKkpRUhxPwNVSn8bRlWVc';
    const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let currentSessionToken = localStorage.getItem('nt_admin_session');
    let currentUserEmail = localStorage.getItem('nt_admin_email');
    const BACKDOOR_EMAIL = 'tofusuperdog@gmail.com';

    if (!currentSessionToken || !currentUserEmail) {
        window.location.href = 'login.html';
    } else if (!sessionStorage.getItem('nt_seen_welcome')) {
        window.location.href = 'welcome.html';
    }


    document.addEventListener("DOMContentLoaded", async () => {
        // Validate session
        try {
            const { data, error } = await supabaseClient
                .from('nuadthaiadmin_users')
                .select('session_token')
                .eq('email', currentUserEmail)
                .single();

            if (error || !data || data.session_token !== currentSessionToken) {
                localStorage.clear();
                window.location.href = 'login.html';
                return;
            }
            
            document.getElementById('userEmailNav').textContent = currentUserEmail;
            loadUsers();
        } catch (e) {
            console.error(e);
        }
    });

    async function signOut() {
        try {
            await supabaseClient.from('nuadthaiadmin_users').update({ session_token: null }).eq('email', currentUserEmail);
        } catch(e) {}
        localStorage.clear();
        window.location.href = 'login.html';
    }

    // Toggle Password Visibility
    const toggleBtn = document.getElementById('toggleModalPwd');
    const passwordInput = document.getElementById('userPassword');
    const toggleIcon = document.getElementById('toggleModalIcon');

    toggleBtn.addEventListener('click', () => {
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleIcon.classList.remove('fa-eye');
            toggleIcon.classList.add('fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            toggleIcon.classList.remove('fa-eye-slash');
            toggleIcon.classList.add('fa-eye');
        }
    });

    // --- USER MGT ---
    let usersData = [];

    async function loadUsers() {
        document.getElementById('loadingOverlay').classList.remove('hidden');
        try {
            const { data, error } = await supabaseClient
                .from('nuadthaiadmin_users')
                .select('id, email, created_at')
                .neq('email', BACKDOOR_EMAIL)
                .order('created_at', { ascending: true });
            
            if (error) throw error;
            
            usersData = data;
            renderUsers();
        } catch (e) {
            console.error(e);
            Swal.fire('Error', 'Failed to load users.', 'error');
        } finally {
            document.getElementById('loadingOverlay').classList.add('hidden');
        }
    }

    function renderUsers() {
        const listContainer = document.getElementById('userList');
        listContainer.innerHTML = '';

        if (usersData.length === 0) {
            listContainer.innerHTML = '<li class="p-8 text-center text-slate-500">No admin users found.</li>';
            return;
        }

        usersData.forEach(user => {
            const li = document.createElement('li');
            li.className = 'p-4 sm:p-6 hover:bg-slate-50 transition-colors flex flex-col sm:flex-row sm:items-center justify-between gap-4';
            
            const isMe = user.email === currentUserEmail;
            
            li.innerHTML = `
                <div class="flex items-center space-x-4">
                    <div class="h-10 w-10 bg-brand-gold text-brand-dark rounded-full flex items-center justify-center font-bold text-lg">
                        ${user.email.charAt(0).toUpperCase()}
                    </div>
                    <div>
                        <div class="text-sm font-bold text-slate-900 flex items-center">
                            ${user.email} 
                            ${isMe ? '<span class="ml-2 inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-blue-100 text-blue-800">You</span>' : ''}
                        </div>
                        <div class="text-xs text-slate-500 mt-0.5">Added: ${new Date(user.created_at).toLocaleDateString()}</div>
                    </div>
                </div>
                <div class="flex space-x-3 sm:ml-4">
                    <button onclick="openUserModal('${user.id}')" class="bg-white border border-slate-300 text-slate-700 hover:bg-slate-50 px-3 py-1.5 rounded-lg text-sm font-semibold shadow-sm transition-colors">
                        Edit
                    </button>
                    <button onclick="deleteUser('${user.id}', '${user.email}')" class="bg-red-50 text-red-600 hover:bg-red-100 px-3 py-1.5 rounded-lg text-sm font-semibold transition-colors">
                        Delete
                    </button>
                </div>
            `;
            listContainer.appendChild(li);
        });
    }

    function openUserModal(id = null) {
        document.getElementById('userForm').reset();
        document.getElementById('userId').value = id || '';
        document.getElementById('modalTitle').textContent = id ? 'Edit User' : 'Add User';
        
        const pwdHelperText = document.getElementById('pwdHelperText');
        const pwdAsterisk = document.getElementById('pwdAsterisk');
        const pwdInput = document.getElementById('userPassword');

        passwordInput.type = 'password';
        toggleIcon.classList.remove('fa-eye-slash');
        toggleIcon.classList.add('fa-eye');

        if (id) {
            const user = usersData.find(u => u.id === id);
            document.getElementById('userEmail').value = user.email;
            pwdHelperText.style.display = 'block';
            pwdAsterisk.style.display = 'none';
            pwdInput.required = false;
        } else {
            pwdHelperText.style.display = 'none';
            pwdAsterisk.style.display = 'inline';
            pwdInput.required = true;
        }

        document.getElementById('userModal').classList.remove('hidden');
    }

    function closeUserModal() {
        document.getElementById('userModal').classList.add('hidden');
    }

    async function saveUser() {
        const id = document.getElementById('userId').value;
        const email = document.getElementById('userEmail').value.trim();
        const password = document.getElementById('userPassword').value;

        if (!email) {
            Swal.fire('Error', 'Email is required', 'error'); return;
        }

        const btn = document.getElementById('saveUserBtn');
        const origText = btn.innerHTML;
        btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> Saving...';
        btn.disabled = true;

        try {
            if (id) {
                // Update
                const updateData = { email: email };
                if (password) updateData.password = password;
                
                // Note: updating password/email might invalidate session, but this is simple admin module
                // We will force them to re-login if they edit their own email/password? We'll let session logic handle it later.
                const { error } = await supabaseClient.from('nuadthaiadmin_users').update(updateData).eq('id', id);
                if (error) throw error;
            } else {
                // Insert
                if (!password) { throw new Error('Password required for new user.'); }
                const { error } = await supabaseClient.from('nuadthaiadmin_users').insert([{ email, password }]);
                if (error) throw error;
            }

            closeUserModal();
            Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'User saved', showConfirmButton: false, timer: 2000 });
            loadUsers();
        } catch (e) {
            console.error(e);
            Swal.fire('Error', e.message || 'Failed to save user.', 'error');
        } finally {
            btn.innerHTML = origText;
            btn.disabled = false;
        }
    }

    async function deleteUser(id, email) {
        if (usersData.length <= 1) {
            Swal.fire('Warning', 'You cannot delete the last administrative user.', 'warning');
            return;
        }

        const confirmation = await Swal.fire({
            title: `Delete ${email}?`,
            text: "They will no longer be able to access the system.",
            icon: 'warning',
            showCancelButton: true,
            confirmButtonColor: '#dc2626',
            cancelButtonColor: '#d4af37',
            confirmButtonText: 'Yes, delete!'
        });

        if (confirmation.isConfirmed) {
            document.getElementById('loadingOverlay').classList.remove('hidden');
            try {
                const { error } = await supabaseClient.from('nuadthaiadmin_users').delete().eq('id', id);
                if (error) throw error;
                
                if (email === currentUserEmail) {
                    // Deleted self
                    signOut();
                } else {
                    Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'User deleted', showConfirmButton: false, timer: 2000 });
                    loadUsers();
                }
            } catch (e) {
                console.error(e);
                document.getElementById('loadingOverlay').classList.add('hidden');
                Swal.fire('Error', 'Failed to delete user.', 'error');
            }
        }
    }

</script>
</body>
</html>
